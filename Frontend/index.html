<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Flash – Simple Ecommerce</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== HEADER ===== -->
  <header>
    <nav>
      <div class="logo">Flash<span>Shop</span></div>

      <!-- Search bar (filtering handled in JS) -->
      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search products…" oninput="filterProducts()"/>
        <button>🔍</button>
      </div>

      <div class="nav-actions">
        <!-- Cart button -->
        <button class="cart-btn" onclick="openCart()">
          🛒 Cart
          <span class="cart-count" id="cartCount">0</span>
        </button>
      </div>
    </nav>
  </header>

  <!-- ===== HERO SECTION ===== -->
  <section class="hero">
    <h1>Shop the <span>Best Deals</span><br/>Online Today</h1>
    <p>Quality products, fast delivery, and unbeatable prices — all in one place.</p>
    <button class="hero-btn" onclick="document.querySelector('.products-section').scrollIntoView({behavior:'smooth'})">
      Shop Now ↓
    </button>
  </section>

  <!-- ===== CATEGORY FILTER ===== -->
  <section class="filter-section">
    <h2>Our Products</h2>
    <div class="categories" id="categoryTabs">
      <!-- Buttons generated by JS -->
    </div>
  </section>

  <!-- ===== PRODUCT GRID ===== -->
  <section class="products-section">
    <div class="product-grid" id="productGrid">
      <!-- Cards generated by JS -->
    </div>
    <div class="no-results" id="noResults">
      😕 No products found. Try a different search or category.
    </div>
  </section>

  <!-- ===== CART SIDEBAR ===== -->
  <div class="overlay" id="overlay" onclick="closeCart()"></div>

  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>Your Cart 🛒</h3>
      <button class="close-btn" onclick="closeCart()">✕</button>
    </div>

    <div class="cart-items" id="cartItems">
      <!-- Cart items rendered by JS -->
    </div>

    <div class="cart-footer">
      <div class="cart-total">
        <span>Total</span>
        <span id="cartTotal">₹0</span>
      </div>
      <button class="checkout-btn" onclick="checkout()">
        Proceed to Checkout →
      </button>
    </div>
  </div>

  <!-- ===== TOAST NOTIFICATION ===== -->
  <div class="toast" id="toast"></div>

  <!-- ===== FOOTER ===== -->
  <footer>
    <strong>FalshShop</strong> Project by Sashank "github - Sasi_n195"
  </footer>

<script src="script.js"></script>
</body>
</html>
